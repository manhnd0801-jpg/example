server {
    listen 3000;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ── PBC UI remotes ────────────────────────────────────────────────
    location ^~ /remotes/pbc-auth/ {
        proxy_pass http://pbc-auth-ui:3011/;
    }
    location ^~ /remotes/pbc-student-management/ {
        proxy_pass http://pbc-student-management-ui:3012/;
    }
    location ^~ /remotes/pbc-class-management/ {
        proxy_pass http://pbc-class-management-ui:3013/;
    }
    location ^~ /remotes/pbc-course-management/ {
        proxy_pass http://pbc-course-management-ui:3014/;
    }
    location ^~ /remotes/pbc-subject-management/ {
        proxy_pass http://pbc-subject-management-ui:3015/;
    }
    location ^~ /remotes/pbc-notification/ {
        proxy_pass http://pbc-notification-ui:3016/;
    }

    # ── PBC APIs — strip /api/<name> prefix ──────────────────────────
    location ^~ /api/auth/ {
        rewrite ^/api/auth/(.*)$ /$1 break;
        proxy_pass http://pbc-auth-api:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location ^~ /api/student/ {
        rewrite ^/api/student/(.*)$ /$1 break;
        proxy_pass http://pbc-student-management-api:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location ^~ /api/class/ {
        rewrite ^/api/class/(.*)$ /$1 break;
        proxy_pass http://pbc-class-management-api:3003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location ^~ /api/course/ {
        rewrite ^/api/course/(.*)$ /$1 break;
        proxy_pass http://pbc-course-management-api:3004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location ^~ /api/subject/ {
        rewrite ^/api/subject/(.*)$ /$1 break;
        proxy_pass http://pbc-subject-management-api:3005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location ^~ /api/notification/ {
        rewrite ^/api/notification/(.*)$ /$1 break;
        proxy_pass http://pbc-notification-api:3006;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Static assets ─────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /nginx-health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # ── SPA fallback ──────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
