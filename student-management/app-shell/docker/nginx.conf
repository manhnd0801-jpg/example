server {
    listen 3000;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy PBC remotes — ^~ để có priority cao hơn regex location
    location ^~ /remotes/pbc-auth/ {
        proxy_pass http://pbc-auth-ui:3011/;
        proxy_set_header Host pbc-auth-ui;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ^~ /remotes/pbc-student-management/ {
        proxy_pass http://pbc-student-management-ui:3012/;
        proxy_set_header Host pbc-student-management-ui;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ^~ /remotes/pbc-class-management/ {
        proxy_pass http://pbc-class-management-ui:3013/;
        proxy_set_header Host pbc-class-management-ui;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ^~ /remotes/pbc-course-management/ {
        proxy_pass http://pbc-course-management-ui:3014/;
        proxy_set_header Host pbc-course-management-ui;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ^~ /remotes/pbc-subject-management/ {
        proxy_pass http://pbc-subject-management-ui:3015/;
        proxy_set_header Host pbc-subject-management-ui;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ^~ /remotes/pbc-notification/ {
        proxy_pass http://pbc-notification-ui:3016/;
        proxy_set_header Host pbc-notification-ui;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Static assets cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /nginx-health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # SPA routing — fallback cuối cùng
    location / {
        try_files $uri $uri/ /index.html;
    }
}
