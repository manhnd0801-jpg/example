# AI-GENERATED
# App Shell nginx config — port 3000
# Proxy /remotes/<pbc>/ → PBC UI container (trong Docker network)
# Trong Docker: container name = student-mgmt-pbc-<name>-ui
# Ngoài Docker (dev): vite proxy trong vite.config.ts xử lý

server {
    listen 3000;
    listen [::]:3000;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ── Proxy API backends ────────────────────────────────────────────────────
    # Mỗi PBC API được proxy qua /api/<pbc>/ để tránh CORS từ browser
    # Browser gọi http://localhost:3000/api/auth/v1/... → pbc-auth-api:3001/v1/...

    location ^~ /api/auth/ {
        proxy_pass http://student-mgmt-pbc-auth-api:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/student/ {
        proxy_pass http://student-mgmt-pbc-student-api:3002/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ^~ /api/class/ {
        proxy_pass http://student-mgmt-pbc-class-api:3003/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ^~ /api/course/ {
        proxy_pass http://student-mgmt-pbc-course-api:3004/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ^~ /api/subject/ {
        proxy_pass http://student-mgmt-pbc-subject-api:3005/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ^~ /api/notification/ {
        proxy_pass http://student-mgmt-pbc-notification-api:3006/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Proxy PBC remotes (Module Federation) ────────────────────────────────
    # Mỗi PBC UI serve remoteEntry.js tại /assets/remoteEntry.js
    # App Shell proxy /remotes/<pbc>/ → http://<pbc-ui-container>:<port>/

    location ^~ /remotes/pbc-auth/ {
        proxy_pass http://student-mgmt-pbc-auth-ui:3011/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin *;
    }

    location ^~ /remotes/pbc-student-management/ {
        proxy_pass http://student-mgmt-pbc-student-ui:3012/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin *;
    }

    location ^~ /remotes/pbc-class-management/ {
        proxy_pass http://student-mgmt-pbc-class-ui:3013/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin *;
    }

    location ^~ /remotes/pbc-course-management/ {
        proxy_pass http://student-mgmt-pbc-course-ui:3014/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin *;
    }

    location ^~ /remotes/pbc-subject-management/ {
        proxy_pass http://student-mgmt-pbc-subject-ui:3015/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin *;
    }

    location ^~ /remotes/pbc-notification/ {
        proxy_pass http://student-mgmt-pbc-notification-ui:3016/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin *;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static assets cache ───────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location /nginx-health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
