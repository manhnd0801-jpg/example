# AI-GENERATED
services:
  pbc-class-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: class_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5434:5432"]
    volumes:
      - pbc_class_db:/var/lib/postgresql/data
      - ../db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d class_management"]
      interval: 10s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment: { ZOOKEEPER_CLIENT_PORT: 2181, ZOOKEEPER_TICK_TIME: 2000 }

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on: [zookeeper]

  pbc-class-api:
    build: { context: .., dockerfile: docker/Dockerfile.api }
    ports: ["3003:3003"]
    environment:
      NODE_ENV: development
      PORT: 3003
      DATABASE_URL: postgresql://postgres:postgres@pbc-class-db:5432/class_management
      JWT_SECRET: dev-secret
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: pbc-class-management
      KAFKA_CONSUMER_GROUP: cg.class-mgmt
      KAFKA_GROUP_ID: cg.class-mgmt
      CORS_ORIGIN: http://localhost:3000
      LOG_LEVEL: info
    depends_on: [pbc-class-db, kafka]

  pbc-class-ui:
    build: { context: .., dockerfile: docker/Dockerfile.ui }
    ports: ["3013:3013"]
    depends_on: [pbc-class-api]

volumes:
  pbc_class_db:
