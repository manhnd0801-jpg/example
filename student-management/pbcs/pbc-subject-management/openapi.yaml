# AI-GENERATED
openapi: 3.1.0
info:
  title: Subject Management API
  description: API for managing subject catalog, credits, and assignments to classes and courses
  version: 1.0.0
  contact:
    name: Subject Management Team
    email: support@example.com

servers:
  - url: http://localhost:3005/v1
    description: Development server
  - url: https://api.student-portal.com/v1
    description: Production server

security:
  - bearerAuth: []

paths:
  /health:
    get:
      summary: Health check endpoint
      description: Returns the health status of the service
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "healthy"
                  timestamp:
                    type: string
                    format: date-time

  /subjects:
    get:
      summary: List subjects
      description: Retrieve a paginated list of subjects with optional filtering
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: search
          in: query
          description: Search in subjectName or subjectCode
          schema:
            type: string
        - name: subjectType
          in: query
          description: Filter by subject type
          schema:
            type: string
            enum: [REQUIRED, ELECTIVE, FREE_ELECTIVE]
        - name: minCredits
          in: query
          description: Filter by minimum total credits
          schema:
            type: integer
            minimum: 0
        - name: maxCredits
          in: query
          description: Filter by maximum total credits
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: List of subjects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlexiblePayload'
              example:
                data:
                  subjects:
                    - id: "012e3456-e89b-12d3-a456-426614174003"
                      subjectCode: "CS101"
                      subjectName: "Introduction to Programming"
                      theoryCredits: 2
                      practiceCredits: 1
                      totalCredits: 3
                      subjectType: "REQUIRED"
                  pagination:
                    page: 1
                    pageSize: 20
                    total: 75
                    totalPages: 4
                metadata:
                  timestamp: "2024-01-15T10:30:00Z"
                  requestId: "req_abc123"
                  correlationId: "corr_xyz789"
                  tenantId: "tenant-001"

    post:
      summary: Create subject
      description: Create a new subject in the catalog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FlexiblePayload'
            example:
              data:
                subjectCode: "CS102"
                subjectName: "Data Structures and Algorithms"
                description: "Fundamental data structures and algorithms"
                theoryCredits: 3
                practiceCredits: 1
                subjectType: "REQUIRED"
                attributes:
                  prerequisites: ["CS101"]
                  difficulty: "intermediate"
                  department: "Computer Science"
              metadata:
                requestId: "req_def456"
                correlationId: "corr_abc123"
                tenantId: "tenant-001"
      responses:
        '201':
          description: Subject created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlexiblePayload'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /subjects/{id}:
    get:
      summary: Get subject details
      description: Retrieve detailed information about a specific subject
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Subject details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlexiblePayload'
        '404':
          description: Subject not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      summary: Update subject
      description: Update an existing subject
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FlexiblePayload'
      responses:
        '200':
          description: Subject updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlexiblePayload'
        '404':
          description: Subject not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: Delete subject
      description: Delete a subject (only if not assigned to any class or course)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Subject deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlexiblePayload'
        '409':
          description: Cannot delete subject with active assignments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /subjects/{id}/assign-to-class:
    post:
      summary: Assign subject to class
      description: Assign a subject to a specific class with teaching details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FlexiblePayload'
            example:
              data:
                classId: "456e7890-e89b-12d3-a456-426614174001"
                semester: 1
                teacherId: "345e6789-e89b-12d3-a456-426614174004"
                schedule: "Mon-Wed-Fri 10:00-12:00"
                room: "A201"
              metadata:
                requestId: "req_assign_class123"
                correlationId: "corr_assign_class456"
                tenantId: "tenant-001"
      responses:
        '200':
          description: Subject assigned to class successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlexiblePayload'
        '409':
          description: Subject already assigned to this class
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /subjects/{id}/assign-to-course:
    post:
      summary: Assign subject to course
      description: Assign a subject to a course curriculum
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FlexiblePayload'
            example:
              data:
                courseId: "789e0123-e89b-12d3-a456-426614174002"
                semesterId: 1
                isRequired: true
                orderIndex: 5
              metadata:
                requestId: "req_assign_course123"
                correlationId: "corr_assign_course456"
                tenantId: "tenant-001"
      responses:
        '200':
          description: Subject assigned to course successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlexiblePayload'
        '409':
          description: Subject already assigned to this course
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    FlexiblePayload:
      type: object
      required:
        - data
        - metadata
      properties:
        data:
          type: object
          description: Business data payload
        metadata:
          $ref: '#/components/schemas/Metadata'

    Metadata:
      type: object
      required:
        - timestamp
        - requestId
        - tenantId
      properties:
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string
        correlationId:
          type: string
        traceId:
          type: string
        tenantId:
          type: string

    ErrorResponse:
      type: object
      properties:
        data:
          type: "null"
        metadata:
          allOf:
            - $ref: '#/components/schemas/Metadata'
            - type: object
              properties:
                error:
                  type: object
                  properties:
                    code:
                      type: string
                    message:
                      type: string
                    details:
                      type: object

    Subject:
      type: object
      required:
        - id
        - subjectCode
        - subjectName
        - theoryCredits
        - practiceCredits
        - totalCredits
        - subjectType
      properties:
        id:
          type: string
          format: uuid
        subjectCode:
          type: string
          pattern: '^[A-Z]{2}[0-9]{3}$'
        subjectName:
          type: string
          maxLength: 255
        description:
          type: string
        theoryCredits:
          type: integer
          minimum: 0
          maximum: 10
        practiceCredits:
          type: integer
          minimum: 0
          maximum: 10
        totalCredits:
          type: integer
          minimum: 1
          maximum: 15
        subjectType:
          type: string
          enum: [REQUIRED, ELECTIVE, FREE_ELECTIVE]
        attributes:
          type: object
          description: Extensible JSON attributes
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SubjectClass:
      type: object
      required:
        - subjectId
        - classId
        - semester
      properties:
        subjectId:
          type: string
          format: uuid
        classId:
          type: string
          format: uuid
        semester:
          type: integer
          minimum: 1
          maximum: 8
        teacherId:
          type: string
          format: uuid
        schedule:
          type: string
        room:
          type: string
        status:
          type: string
          enum: [ACTIVE, COMPLETED, CANCELLED]