# AI-GENERATED
# Chạy pbc-auth local: API + UI + PostgreSQL + Kafka
# Usage: cd docker && docker-compose up --build

services:

  # ── PostgreSQL ──────────────────────────────────────────────
  pbc-auth-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pbc_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pbc_auth_db:/var/lib/postgresql/data
      - ../db/migrations:/docker-entrypoint-initdb.d   # auto-run migrations on first start
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pbc_auth"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Kafka (Zookeeper + Broker) ───────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── NestJS API ───────────────────────────────────────────────
  pbc-auth-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      LOG_LEVEL: debug
      DATABASE_URL: postgresql://postgres:postgres@pbc-auth-db:5432/pbc_auth
      JWT_SECRET: dev-secret-change-in-production
      JWT_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      KAFKA_BROKERS: kafka:29092
      KAFKA_GROUP_ID: cg.auth
      KAFKA_CLIENT_ID: pbc-auth-api
      TENANT_HEADER_NAME: X-Tenant-Id
    depends_on:
      pbc-auth-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: on-failure

  # ── React UI ─────────────────────────────────────────────────
  pbc-auth-ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ui
    ports:
      - "3011:3011"
    depends_on:
      pbc-auth-api:
        condition: service_healthy

volumes:
  pbc_auth_db:
