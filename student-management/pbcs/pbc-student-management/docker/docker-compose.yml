# AI-GENERATED
services:
  pbc-student-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: student_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5433:5432"]
    volumes:
      - pbc_student_db:/var/lib/postgresql/data
      - ../db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment: { ZOOKEEPER_CLIENT_PORT: 2181, ZOOKEEPER_TICK_TIME: 2000 }

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on: [zookeeper]

  pbc-student-api:
    build: { context: .., dockerfile: docker/Dockerfile.api }
    ports: ["3002:3002"]
    environment:
      PORT: 3002
      DATABASE_URL: postgresql://postgres:postgres@pbc-student-db:5432/student_management
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: pbc-student-management
      KAFKA_CONSUMER_GROUP: cg.student-mgmt
      JWT_SECRET: dev-secret
    depends_on: [pbc-student-db, kafka]

  pbc-student-ui:
    build: { context: .., dockerfile: docker/Dockerfile.ui }
    ports: ["3012:3012"]
    depends_on: [pbc-student-api]

volumes:
  pbc_student_db:
