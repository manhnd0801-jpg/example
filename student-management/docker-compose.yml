      dockerfile: docker/Dockerfile.api
    container_name: student-mgmt-pbc-course-api
    ports:
      - "3004:3004"
    environment:
      NODE_ENV: development
      PORT: 3004
      DATABASE_URL: postgresql://postgres:postgres@pbc-course-db:5432/pbc_course
      JWT_SECRET: dev-secret-change-in-production
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_GROUP_ID: cg.course-management
      KAFKA_CLIENT_ID: pbc-course-management-api
