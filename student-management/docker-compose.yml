  # ── pbc-notification ──────────────────────────────────────────────────────────
  pbc-notification-db:
    image: postgres:16-alpine
    container_name: student-mgmt-pbc-notification-db
    environment:
      POSTGRES_DB: pbc_notification
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5437:5432"
    volumes:
      - pbc_notification_db:/var/lib/postgresql/data
      - ./pbcs/pbc-notification/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pbc_notification"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  pbc-notification-api:
    build:
      context: ./pbcs/pbc-notification
      dockerfile: docker/Dockerfile.api
    container_name: student-mgmt-pbc-notification-api
    ports:
      - "3006:3006"
    environment:
      NODE_ENV: development
      PORT: 3006
      DATABASE_URL: postgresql://postgres:postgres@pbc-notification-db:5432/pbc_notification
      JWT_SECRET: dev-secret-change-in-production
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_GROUP_ID: cg.notification
      KAFKA_CLIENT_ID: pbc-notification-api
    depends_on:
      pbc-notification-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3006/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: on-failure

  pbc-notification-ui:
    build:
      context: ./pbcs/pbc-notification
      dockerfile: docker/Dockerfile.ui
      args:
        VITE_API_URL: http://localhost:3006
        VITE_DEV_TENANT_ID: dev-tenant
    container_name: student-mgmt-pbc-notification-ui
    ports:
      - "3016:3016"
    depends_on:
      pbc-notification-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3016/nginx-health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── App Shell ─────────────────────────────────────────────────────────────────
  # App Shell phụ thuộc tất cả PBC UI — khi `docker compose up --build` chạy,
  # tất cả PBC images sẽ được build lại trước khi app-shell start
  app-shell:
    build:
      context: .
      dockerfile: app-shell/Dockerfile
    container_name: student-mgmt-app-shell
    ports:
      - "3000:3000"
    depends_on:
      pbc-auth-ui:
        condition: service_healthy
      pbc-student-management-ui:
        condition: service_healthy
      pbc-class-management-ui:
        condition: service_healthy
      pbc-course-management-ui:
        condition: service_healthy
      pbc-subject-management-ui:
        condition: service_healthy
      pbc-notification-ui:
        condition: service_healthy
      kafka-gateway:
        condition: service_healthy
    environment:
      VITE_KAFKA_GATEWAY_URL: "ws://localhost:4000"
      VITE_ENV: "local"
      VITE_API_BASE_URL: "http://localhost:3001"
      VITE_CDN_BASE_URL: "http://localhost:3000"
      VITE_TENANT_ID: "dev-tenant"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/nginx-health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  kafka_data:
    driver: local
  pbc_auth_db:
  pbc_student_db:
  pbc_class_db:
  pbc_course_db:
  pbc_subject_db:
  pbc_notification_db:

networks:
  default:
    name: student-management-network
