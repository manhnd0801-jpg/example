version: "3.9"

# ── Port convention ───────────────────────────────────────────────────────────
#   App Shell:                3000 (nginx, serve static + proxy remotes)
#   pbc-auth-api:             3001
#   pbc-auth-ui:              3011
#   pbc-student-management-api: 3002 (→ VITE_API_URL=http://localhost:3002)
#   pbc-student-management-ui:  3012
#   pbc-class-management-api:   3003
#   pbc-class-management-ui:    3013
#   pbc-course-management-api:  3004
#   pbc-course-management-ui:   3014
#   pbc-subject-management-api: 3005
#   pbc-subject-management-ui:  3015
#   pbc-notification-api:       3006
#   pbc-notification-ui:        3016
#   kafka-gateway:              4000
#   Kafka broker (internal):    9092
#   Kafka broker (external):    9094
#   Kafka UI:                   8080
#   DB ports: 5432-5437

services:

  # ── Kafka (KRaft — không cần Zookeeper) ──────────────────────────────────────
  kafka:
    image: apache/kafka:latest
    container_name: student-mgmt-kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: student-mgmt-kafka-ui
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: "student-management-local"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"

  # ── kafka-gateway — WebSocket bridge: Browser ↔ Kafka (R-03a, R-12) ─────────
  # Browser không connect Kafka trực tiếp — phải qua gateway này
  kafka-gateway:
    build:
      context: ./kafka-gateway
      dockerfile: Dockerfile
    container_name: student-mgmt-kafka-gateway
    ports:
      - "4000:4000"   # ws://localhost:4000 — App Shell kết nối vào đây
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: "kafka:9092"
      GATEWAY_PORT: "4000"
      KAFKA_NUM_PARTITIONS: "1"
      KAFKA_REPLICATION_FACTOR: "1"
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').createConnection(4000,'localhost').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: on-failure

  # ── pbc-auth ──────────────────────────────────────────────────────────────────
  pbc-auth-db:
    image: postgres:16-alpine
    container_name: student-mgmt-pbc-auth-db
    environment:
      POSTGRES_DB: pbc_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pbc_auth_db:/var/lib/postgresql/data
      # db/init/ chứa cả DDL + seed — PostgreSQL chạy theo thứ tự alphabet
      - ./pbcs/pbc-auth/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pbc_auth"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  pbc-auth-api:
    build:
      context: ./pbcs/pbc-auth
      dockerfile: docker/Dockerfile.api
    container_name: student-mgmt-pbc-auth-api
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@pbc-auth-db:5432/pbc_auth
      JWT_SECRET: dev-secret-change-in-production
      JWT_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_GROUP_ID: cg.auth
      KAFKA_CLIENT_ID: pbc-auth-api
    depends_on:
      pbc-auth-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: on-failure

  pbc-auth-ui:
    build:
      context: ./pbcs/pbc-auth
      dockerfile: docker/Dockerfile.ui
      args:
        VITE_AUTH_API_URL: http://localhost:3001
        VITE_DEV_TENANT_ID: dev-tenant
    container_name: student-mgmt-pbc-auth-ui
    ports:
      - "3011:3011"
    depends_on:
      pbc-auth-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3011/nginx-health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── pbc-student-management ────────────────────────────────────────────────────
  pbc-student-db:
    image: postgres:16-alpine
    container_name: student-mgmt-pbc-student-db
    environment:
      POSTGRES_DB: pbc_student
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pbc_student_db:/var/lib/postgresql/data
      - ./pbcs/pbc-student-management/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pbc_student"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  pbc-student-management-api:
    build:
      context: ./pbcs/pbc-student-management
      dockerfile: docker/Dockerfile.api
    container_name: student-mgmt-pbc-student-api
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: development
      PORT: 3002
      DATABASE_URL: postgresql://postgres:postgres@pbc-student-db:5432/pbc_student
      JWT_SECRET: dev-secret-change-in-production
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_GROUP_ID: cg.student-management
      KAFKA_CLIENT_ID: pbc-student-management-api
    depends_on:
      pbc-student-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: on-failure

  pbc-student-management-ui:
    build:
      context: ./pbcs/pbc-student-management
      dockerfile: docker/Dockerfile.ui
      args:
        VITE_API_URL: http://localhost:3002
        VITE_DEV_TENANT_ID: dev-tenant
    container_name: student-mgmt-pbc-student-ui
    ports:
      - "3012:3012"
    depends_on:
      pbc-student-management-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3012/nginx-health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── pbc-class-management ──────────────────────────────────────────────────────
  pbc-class-db:
    image: postgres:16-alpine
    container_name: student-mgmt-pbc-class-db
    environment:
      POSTGRES_DB: pbc_class
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - pbc_class_db:/var/lib/postgresql/data
      - ./pbcs/pbc-class-management/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pbc_class"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  pbc-class-management-api:
    build:
      context: ./pbcs/pbc-class-management
      dockerfile: docker/Dockerfile.api
    container_name: student-mgmt-pbc-class-api
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: development
      PORT: 3003
      DATABASE_URL: postgresql://postgres:postgres@pbc-class-db:5432/pbc_class
      JWT_SECRET: dev-secret-change-in-production
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_GROUP_ID: cg.class-management
      KAFKA_CLIENT_ID: pbc-class-management-api
    depends_on:
      pbc-class-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: on-failure

  pbc-class-management-ui:
    build:
      context: ./pbcs/pbc-class-management
      dockerfile: docker/Dockerfile.ui
      args:
        VITE_API_URL: http://localhost:3003
        VITE_DEV_TENANT_ID: dev-tenant
    container_name: student-mgmt-pbc-class-ui
    ports:
      - "3013:3013"
    depends_on:
      pbc-class-management-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3013/nginx-health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── pbc-course-management ─────────────────────────────────────────────────────
  pbc-course-db:
    image: postgres:16-alpine
    container_name: student-mgmt-pbc-course-db
    environment:
