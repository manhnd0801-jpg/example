version: "3.9"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper

  pbc-auth-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pbc_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pbc_auth_db:/var/lib/postgresql/data
      - ./pbcs/pbc-auth/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pbc_auth"]
      interval: 10s
      retries: 5

  pbc-auth-api:
    build:
      context: ./pbcs/pbc-auth
      dockerfile: docker/Dockerfile.api
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      LOG_LEVEL: info
      DATABASE_URL: postgresql://postgres:postgres@pbc-auth-db:5432/pbc_auth
      JWT_SECRET: dev-secret
      JWT_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      KAFKA_BROKERS: kafka:29092
      KAFKA_GROUP_ID: cg.auth
      KAFKA_CLIENT_ID: pbc-auth-api
      TENANT_HEADER_NAME: X-Tenant-Id
      CORS_ORIGIN: http://localhost:3011,http://localhost:3000
    depends_on:
      - pbc-auth-db
      - kafka

  pbc-auth-ui:
    build:
      context: ./pbcs/pbc-auth
      dockerfile: docker/Dockerfile.ui
    ports:
      - "3011:3011"
    depends_on:
      - pbc-auth-api

  pbc-student-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: student_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pbc_student_db:/var/lib/postgresql/data
      - ./pbcs/pbc-student-management/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d student_management"]
      interval: 10s
      retries: 5

  pbc-student-management-api:
    build:
      context: ./pbcs/pbc-student-management
      dockerfile: docker/Dockerfile.api
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: development
      PORT: 3002
      DATABASE_URL: postgresql://postgres:postgres@pbc-student-db:5432/student_management
      JWT_SECRET: dev-secret
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: pbc-student-management
      KAFKA_CONSUMER_GROUP: cg.student-mgmt
      KAFKA_GROUP_ID: cg.student-mgmt
      CORS_ORIGIN: http://localhost:3012,http://localhost:3000
      LOG_LEVEL: info
    depends_on:
      - pbc-student-db
      - kafka

  pbc-student-management-ui:
    build:
      context: ./pbcs/pbc-student-management
      dockerfile: docker/Dockerfile.ui
    ports:
      - "3012:3012"
    depends_on:
      - pbc-student-management-api

  pbc-class-db:
